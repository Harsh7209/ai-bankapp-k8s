name: Packages-check
on: workflow_dispatch
jobs:
  packages_check_workflow:
    runs-on: ubuntu-latest
    steps:
      - name: code-checkout
        uses: actions/checkout@v4

      - name: setup java-env
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: check packages
        run: mvn -B package --file pom.xml
